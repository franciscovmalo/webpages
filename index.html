<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digi.mz</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="container">
    
    <div class="left-bar"></div>
    
    <form>
      <p>Inscreva-se para participar do debate</p>
      <div class="input-group">
        <label>Nome:</label>
        <input type="text" placeholder="Digite o seu Nome Completo" id="contact-name" onkeyup="validateName()">
        <span id="name-error"></span>
      </div>

      <div class="input-group">
        <label>Contacto:</label>
        <input type="tel" placeholder="(+258)" id="contact-phone" onkeyup="validatePhone()">
        <span id="phone-error"></span>
      </div>

      <div class="input-group">
        <label>Email:</label>
        <input type="email" placeholder="Digite o seu Email" id="contact-email" onkeyup="validateEmail()">
        <span id="email-error"></span>
      </div>   

      <div class="input-group">
        <label>Sobre Voce:</label>
        <textarea rows="5" placeholder="Um breve texto sobre voce" id="contact-message" onkeyup="validateMessage()"></textarea>
        <span id="message-error"></span>
      </div>

      <button onclick="return validateForm()">Submeter</button>
      <span id="submit-error"></span>
    </form>    
  </div>
   <script src="script.js"></script>
</body>
</html>
